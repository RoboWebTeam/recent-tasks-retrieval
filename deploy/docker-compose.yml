# Полный стек проекта одной командой: PostgreSQL + backend (все Cloud Functions) + nginx с фронтендом.
#
# Использование (из корня проекта):
#   cd deploy
#   cp .env.example .env      # заполните секретами
#   docker compose up -d --build
#
# После первого запуска один раз восстановите базу данных из дампа:
#   docker compose exec -T db psql -U roboweb_user -d roboweb < db_dump.sql
#
# Сайт будет доступен на http://<ip-сервера> (порт 80).
# Для HTTPS — поставьте перед nginx-контейнером certbot или Traefik/Caddy отдельно.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - roboweb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  # Бутстрап HTTPS: если реального сертификата ещё нет — кладём самоподписанный dummy,
  # чтобы nginx с 443-блоком гарантированно стартовал. Реальный сертификат выпускается позже
  # (deploy/init-letsencrypt.sh), после чего этот шаг видит его и ничего не делает.
  certbot-init:
    image: alpine:3.20
    volumes:
      - certbot_certs:/etc/letsencrypt
    command: >
      sh -ec '
      D=/etc/letsencrypt/live/roboweb.dev;
      if [ ! -f "$$D/fullchain.pem" ]; then
        apk add --no-cache openssl >/dev/null 2>&1;
        mkdir -p "$$D";
        openssl req -x509 -nodes -newkey rsa:2048 -days 3650
          -keyout "$$D/privkey.pem" -out "$$D/fullchain.pem" -subj "/CN=roboweb.dev";
        echo "dummy cert created";
      else echo "cert already present"; fi'

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${SITE_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      certbot-init:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot

  # Автопродление сертификата (каждые 12ч проверяет и продлевает через webroot-челлендж).
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      sh -c 'trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!}; done'

volumes:
  roboweb_pgdata:
  certbot_certs:
  certbot_webroot:
