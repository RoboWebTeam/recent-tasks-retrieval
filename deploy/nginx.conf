# HTTP: домен roboweb.dev редиректим на HTTPS; по IP (default_server _) продолжаем отдавать сайт
# по HTTP (у IP нет валидного сертификата). ACME-челлендж всегда доступен для выпуска/продления.
server {
    listen 80;
    server_name roboweb.dev www.roboweb.dev;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / { try_files $uri /index.html; }
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}

# HTTPS. Сертификат берётся из тома certbot_certs. До выпуска реального — там лежит самоподписанный
# dummy (создаёт сервис certbot-init), поэтому nginx стартует всегда и не падает без сертификата.
server {
    listen 443 ssl;
    http2 on;
    server_name roboweb.dev www.roboweb.dev _;

    ssl_certificate     /etc/letsencrypt/live/roboweb.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roboweb.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    root /usr/share/nginx/html;
    index index.html;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / { try_files $uri /index.html; }
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
