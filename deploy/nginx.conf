server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        # generate-site (Claude Sonnet 5 / Opus 4.8) может отвечать до ~90с — поднимаем
        # таймауты выше nginx-дефолта (60с), иначе долгая генерация обрывается.
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        # SSE-стриминг генерации (лайв-сборка сайта): HTTP/1.1 без keep-alive-заголовка
        # обязателен для потоковой передачи по частям. Саму буферизацию отключает заголовок
        # ответа X-Accel-Buffering:no, который backend ставит только на стрим-ответы.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
